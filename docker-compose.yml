services:
  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://backend:8000

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - redis
    environment:
      - DATABASE_URL=sqlite:///./cyberlinkage.db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cyberlinkage2026
      - JWT_SECRET=cyberlinkage-secret-key-change-in-production
      - REDIS_URL=redis://redis:6379
    volumes:
      - backend-data:/app/data

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/cyberlinkage2026
    volumes:
      - neo4j-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  backend-data:
  neo4j-data:
